---
# Which port the server should listen on.
port: 8080

# Which content types the static server should use. 'if' is a regex that's
# matched against the filename; if it matches, the content type in 'then'
# is sent.
content-types:
  - if: .*\.html?
    then: text/html; charset=utf-8
  - if: .*\.json
    then: application/json; charset=utf-8
  - if: .*\.js
    then: text/javascript; charset=utf-8
  - if: .*\.css
    then: text/css; charset=utf-8
  - if: .*\.svg
    then: image/svg+xml; charset=utf-8
  - if: .*\.png
    then: image/png
  - if: .*\.jpe?g
    then: image/jpeg
  - if: .*\.gif
    then: image/gif
  - if: .*\.ico
    then: image/vnd.microsoft.icon

# Example of a custom data structure. See api.md for more information.
custom-structures:
  gps:
    coord:
      x:
        key: truck.world.placement.0
        operator: round
      y:
        key: truck.world.placement.1
        operator: round
      z:
        key: truck.world.placement.2
        operator: round
    heading:
      key: truck.world.placement.3
      scale: 360
      operator: round
    time:
      key: game.time
      operator: date
